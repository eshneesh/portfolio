<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Power BI Word Cloud HTML</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #dbe3ef;
      --surface: #ffffff;
      --soft: #f7f9fc;
      --teal: #0f766e;
      --blue: #1d4ed8;
      --amber: #b45309;
      --rose: #be123c;
      --violet: #6d28d9;
      --slate: #334155;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #eef3f8;
      color: var(--ink);
    }

    .shell {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(280px, 390px) minmax(0, 1fr);
      gap: 16px;
      align-items: stretch;
    }

    .panel,
    .visual {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 16px 44px rgba(15, 23, 42, .08);
    }

    .panel {
      padding: 16px;
    }

    .visual {
      min-height: 560px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .visual-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    }

    h1 {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
      font-weight: 750;
      letter-spacing: 0;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    label {
      display: block;
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    textarea,
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfdff;
      color: var(--ink);
      font: inherit;
      outline: none;
    }

    textarea {
      min-height: 270px;
      resize: vertical;
      padding: 12px;
      line-height: 1.45;
    }

    input {
      height: 36px;
      padding: 0 10px;
    }

    textarea:focus,
    input:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, .14);
    }

    .settings {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .cloud {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      align-content: center;
      flex-wrap: wrap;
      gap: 0;
      padding: clamp(18px, 4vw, 42px);
      text-align: center;
      line-height: 1.12;
      background:
        linear-gradient(180deg, rgba(255,255,255,.92), rgba(248,250,252,.96)),
        repeating-linear-gradient(135deg, rgba(15,23,42,.035) 0 1px, transparent 1px 22px);
    }

    .word {
      display: inline-block;
      margin: 5px 7px;
      line-height: 1;
      transition: transform .16s ease, opacity .16s ease;
      cursor: default;
    }

    .word:hover {
      transform: translateY(-2px) scale(1.04);
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
    }

    .hint {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    @media (max-width: 860px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .visual {
        min-height: 440px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="toolbar" aria-label="Power BI word cloud preview">
      <aside class="panel">
        <label for="messages">Сообщения из столбца</label>
        <textarea id="messages">Клиенты пишут, что доставка быстрая и поддержка отвечает быстро.
Поддержка помогла решить вопрос, но доставка задержалась.
Очень нравится качество продукта, качество упаковки и понятная коммуникация.
Вопрос по оплате решен быстро, поддержка вежливая.
Хотим быстрее видеть статус заказа и уведомления по доставке.
Продукт хороший, но нужно улучшить оплату и личный кабинет.</textarea>

        <div class="settings">
          <div>
            <label for="limit">Топ слов</label>
            <input id="limit" type="number" min="8" max="90" value="45">
          </div>
          <div>
            <label for="minLength">Мин. длина</label>
            <input id="minLength" type="number" min="2" max="12" value="3">
          </div>
        </div>

        <p class="hint">В Power BI используйте DAX-меру из файла powerbi-word-cloud-measure.dax. Это превью нужно только для настройки внешнего вида и проверки логики.</p>
      </aside>

      <section class="visual">
        <header class="visual-head">
          <h1>Облако частых слов</h1>
          <div class="meta" id="meta">0 слов</div>
        </header>
        <div class="cloud" id="cloud"></div>
      </section>
    </section>
  </main>

  <script>
    const stopWords = new Set([
      "и","в","во","не","что","он","на","я","с","со","как","а","то","все","она","так","его","но","да","ты","к","у","же","вы","за","бы","по","только","ее","мне","было","вот","от","меня","еще","нет","о","из","ему","теперь","когда","даже","ну","вдруг","ли","если","уже","или","ни","быть","был","него","до","вас","нибудь","опять","уж","вам","ведь","там","потом","себя","ничего","ей","может","они","тут","где","есть","надо","ней","для","мы","тебя","их","чем","была","сам","чтоб","без","будто","чего","раз","тоже","себе","под","будет","ж","тогда","кто","этот","того","потому","этого","какой","совсем","ним","здесь","этом","один","почти","мой","тем","чтобы","нее","сейчас","были","куда","зачем","всех","никогда","можно","при","наконец","два","об","другой","хоть","после","над","больше","тот","через","эти","нас","про","всего","них","какая","много","разве","три","эту","моя","впрочем","хорошо","свою","этой","перед","иногда","лучше","чуть","том","нельзя","такой","им","более","всегда","конечно","всю","между",
      "the","and","for","with","you","your","are","was","were","this","that","from","have","has","not","but","all","can","our","out","about","into","than","then"
    ]);

    const colors = ["#0f766e", "#1d4ed8", "#b45309", "#be123c", "#6d28d9", "#334155"];
    const messages = document.querySelector("#messages");
    const limit = document.querySelector("#limit");
    const minLength = document.querySelector("#minLength");
    const cloud = document.querySelector("#cloud");
    const meta = document.querySelector("#meta");

    function getWords(text) {
      return text
        .toLowerCase()
        .replace(/[^\p{L}\p{N}]+/gu, " ")
        .trim()
        .split(/\s+/)
        .filter(Boolean)
        .filter((word) => word.length >= Number(minLength.value || 3))
        .filter((word) => !stopWords.has(word));
    }

    function render() {
      const counts = new Map();
      for (const word of getWords(messages.value)) {
        counts.set(word, (counts.get(word) || 0) + 1);
      }

      const words = [...counts.entries()]
        .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], "ru"))
        .slice(0, Number(limit.value || 45));

      cloud.replaceChildren();
      meta.textContent = words.length ? `Топ ${words.length}` : "Нет данных";

      if (!words.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "Недостаточно текста для облака слов";
        cloud.append(empty);
        return;
      }

      const values = words.map((entry) => entry[1]);
      const min = Math.min(...values);
      const max = Math.max(...values);

      words.forEach(([word, count], index) => {
        const scale = max === min ? .45 : (count - min) / (max - min);
        const span = document.createElement("span");
        span.className = "word";
        span.textContent = word;
        span.title = `${word}: ${count}`;
        span.style.fontSize = `${Math.round(13 + scale * 31)}px`;
        span.style.fontWeight = `${Math.round(500 + scale * 300)}`;
        span.style.color = colors[index % colors.length];
        cloud.append(span);
      });
    }

    messages.addEventListener("input", render);
    limit.addEventListener("input", render);
    minLength.addEventListener("input", render);
    render();
  </script>
</body>
</html>
